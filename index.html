<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto Nube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 50px 60px;
      text-align: center;
      max-width: 560px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #6c63ff, #48c6ef);
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #fff, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 36px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 36px;
    }

    .info-item {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 16px;
    }

    .info-item .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 6px;
    }

    .info-item .value {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Despliegue en la Nube</div>
    <h1>Cesar Jasser</h1>
    <p class="subtitle">Práctica de despliegue universitario &mdash; Render</p>

    <div class="info-grid">
      <div class="info-item">
        <div class="label">Plataforma</div>
        <div class="value">Render</div>
      </div>
      <div class="info-item">
        <div class="label">Runtime</div>
        <div class="value">Node.js</div>
      </div>
      <div class="info-item">
        <div class="label">Framework</div>
        <div class="value">Express</div>
      </div>
      <div class="info-item">
        <div class="label">Año</div>
        <div class="value">2026</div>
      </div>
    </div>

    <div class="status">
      <span class="dot"></span>
      Aplicación activa y funcionando correctamente
    </div>
  </div>
</body>
</html>
